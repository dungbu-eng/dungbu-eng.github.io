<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MxCAD Online | Dungbu Apps</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── HEADER ── */
        .cad-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            background: rgba(5, 5, 5, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            z-index: 9999;
        }

        .cad-header .logo a {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            font-size: 1.2rem;
            font-weight: 800;
            color: inherit;
        }
        .cad-header .logo span { color: var(--secondary-color); }
        .cad-header .logo i   { color: var(--primary-color); }

        .badge-cad {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(9, 9, 121, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.25);
            color: #7dd3fc;
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-cad::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #00d4ff;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .btn-sm {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.38rem 0.9rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-sm.ghost {
            background: rgba(255,255,255,0.06);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-sm.ghost:hover { background: rgba(255,255,255,0.12); }

        /* ── IFRAME ── */
        .iframe-wrap {
            position: fixed;
            top: 54px;
            left: 0; right: 0; bottom: 0;
        }

        #cadFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #0a0a1a;
        }

        /* ── LOADING OVERLAY ── */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        #loadingOverlay.hidden {
            opacity: 0;
        }

        .loader-ring {
            width: 54px; height: 54px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-label {
            margin-top: 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Loading -->
    <div id="loadingOverlay">
        <div class="loader-ring"></div>
        
    </div>

    <!-- Header -->
    <header class="cad-header">
        <div class="logo">
            <a href="index.html">
                <i class="fa-solid fa-layer-group"></i>
                Dungbu<span>Apps</span>
            </a>
        </div>

        <div class="badge-cad">
            <i class="fa-solid fa-drafting-compass"></i>
            MxCAD Online — WebAssembly
        </div>

        <div class="header-right">
            <a href="index.html" class="btn-sm ghost">
                <i class="fa-solid fa-arrow-left"></i>
                Trang chủ
            </a>
        </div>
    </header>

    <!-- MxCAD Embedded -->
    <div class="iframe-wrap">
        <iframe
            id="cadFrame"
            src="https://www.webcadsdk.com/mxcad/"
            title="MxCAD Online CAD Editor"
            allow="cross-origin-isolated; clipboard-read; clipboard-write; fullscreen"
            credentialless
        ></iframe>
    </div>

    <script>
        const overlay = document.getElementById('loadingOverlay');
        const frame   = document.getElementById('cadFrame');

        frame.addEventListener('load', () => {
            // Hide loading overlay once iframe fires load event
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 800);
        });

        // Fallback: hide after 15s regardless
        setTimeout(() => overlay.classList.add('hidden'), 15000);
    </script>
</body>
</html>
